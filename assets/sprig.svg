<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <g stroke="#7E8A6E" stroke-width="1.6" stroke-linecap="round" opacity="0.9">
    <!-- main stem, gently curving -->
    <path d="M40 40 C110 70 170 120 210 210 C222 236 232 258 240 276"/>
    <!-- secondary stem -->
    <path d="M55 60 C90 120 120 150 150 250" opacity="0.7"/>
  </g>
  <!-- eucalyptus leaves along the stems -->
  <g fill="#AEBBA0" fill-opacity="0.62" stroke="#8A9A82" stroke-width="1">
    <ellipse cx="70" cy="58" rx="20" ry="11" transform="rotate(28 70 58)"/>
    <ellipse cx="100" cy="82" rx="22" ry="12" transform="rotate(35 100 82)"/>
    <ellipse cx="132" cy="112" rx="24" ry="13" transform="rotate(42 132 112)"/>
    <ellipse cx="160" cy="146" rx="24" ry="13" transform="rotate(48 160 146)"/>
    <ellipse cx="185" cy="184" rx="23" ry="12" transform="rotate(55 185 184)"/>
    <ellipse cx="206" cy="222" rx="21" ry="11" transform="rotate(60 206 222)"/>
    <!-- opposite side leaves -->
    <ellipse cx="52" cy="86" rx="18" ry="10" transform="rotate(-42 52 86)"/>
    <ellipse cx="78" cy="128" rx="20" ry="11" transform="rotate(-40 78 128)"/>
    <ellipse cx="104" cy="172" rx="21" ry="11" transform="rotate(-38 104 172)"/>
    <ellipse cx="128" cy="216" rx="19" ry="10" transform="rotate(-36 128 216)"/>
  </g>
  <!-- a few round silver-dollar leaves for variety -->
  <g fill="#C3CDB5" fill-opacity="0.5" stroke="#8A9A82" stroke-width="0.9">
    <circle cx="224" cy="256" r="13"/>
    <circle cx="150" cy="252" r="12"/>
    <circle cx="92" cy="248" r="11"/>
  </g>
</svg>
